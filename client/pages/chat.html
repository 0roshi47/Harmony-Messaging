<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Harmony Messaging</title>
        <link rel="stylesheet" href="../stylesheet.css" />
        <script src="../scripts/jquery-4.0.0.min.js"></script>
        <script src="../scripts/chat.js"></script>
    </head>
    <body>
        <div class="app">
            <!-- Sidebar -->
            <aside class="sidebar">
                <header class="sidebar-header">
                    <div class="speudo-wrap">
                        <div class="speudo">
                            <input
                                id="room-name-field"
                                type="text"
                                placeholder="Nom de la nouvelle room" />
                        </div>
                        <button class="new-room">Nouvelle room</button>
                    </div>
                </header>

                <ul class="room-list"></ul>
            </aside>

            <!-- Main conversation -->
            <main class="conversation">
                <!-- <header class="conv-header">
                    <div class="conv-left">
                        <div class="conv-avatar">P</div>
                        <div class="conv-info">
                            <div class="conv-name">Pinou</div>
                            <div class="conv-status">en ligne</div>
                        </div>
                    </div>
                    <div class="conv-actions">
                        <button class="icon">⋯</button>
                    </div>
                </header> -->

                <section class="messages" id="messages"></section>

                <form class="composer" id="composer" autocomplete="off">
                    <input
                        id="message-field"
                        type="text"
                        placeholder="Envoyer un message" />
                    <button type="submit" class="send">Envoyer</button>
                </form>
            </main>
        </div>
    </body>
</html>
